name: srm
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.9.0


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  fl_chart: ^0.70.0 
  printing: ^5.14.2
  pdf: ^3.11.3
  intl: ^0.20.2
  url_launcher: ^6.2.5
  flutter_svg: ^2.0.17


  # State Management
  flutter_bloc: ^9.1.1

  # Networking
  dio: ^5.9.1
  equatable: ^2.0.8

  # Dependency Injection
  get_it: ^9.2.1
  injectable: ^2.7.1+4
  retrofit: ^4.9.2
  json_annotation: ^4.8.1
  get_storage: ^2.1.1
  shimmer: ^3.0.0



dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.8
  flutter_gen_runner: ^5.3.2
  injectable_generator: ^2.6.2
  retrofit_generator: ^10.2.3
  json_serializable: ^6.7.1


flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_gen:
  output: lib/src/core/assets/

  integrations:
    flutter_svg: true